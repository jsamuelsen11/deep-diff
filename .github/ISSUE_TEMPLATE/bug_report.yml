name: Bug Report
description: Report a bug in deep-diff
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: Thanks for reporting a bug! Please fill out the sections below.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to reproduce the bug.
      placeholder: |
        1. Run `deep-diff dir_a/ dir_b/ --depth text`
        2. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should have happened instead?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: deep-diff Version
      description: Output of `deep-diff --version` or `uv pip show deep-diff`
      placeholder: "0.1.0"
    validations:
      required: true
  - type: dropdown
    id: python
    attributes:
      label: Python Version
      options:
        - "3.11"
        - "3.12"
        - "3.13"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Linux
        - macOS
        - Windows
        - Other
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Error Output / Logs
      description: Paste any relevant error output or tracebacks.
      render: shell
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other context (screenshots, config files, etc.)
