name: Feature Request
description: Suggest a new feature for deep-diff
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: Have an idea for deep-diff? We'd love to hear it.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this feature solve? What pain point do you have?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How would you like this to work? Include CLI examples if applicable.
      placeholder: |
        ```bash
        deep-diff dir_a/ dir_b/ --new-flag value
        ```
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What alternatives have you considered?
  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of deep-diff does this relate to?
      options:
        - CLI
        - TUI
        - Comparators (core)
        - Output/Renderers
        - Plugins
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional Context
