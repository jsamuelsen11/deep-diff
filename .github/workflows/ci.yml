name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - run: uv python install ${{ matrix.python-version }}

      - run: uv sync --all-groups

      - name: Run tests with coverage
        run: uv run pytest --cov=deep_diff --cov-report=term-missing --cov-report=xml:coverage.xml

      - name: Upload coverage artifact
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.xml

  coverage:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: coverage

      - uses: k1LoW/octocov-action@v1

      - name: Push coverage badge
        if: github.ref == 'refs/heads/main' && success()
        run: |
          cp docs/images/coverage.svg /tmp/coverage.svg
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git stash --include-untracked
          if git fetch origin badges 2>/dev/null; then
            git checkout badges
          else
            git switch --orphan badges
          fi
          mkdir -p docs/images
          cp /tmp/coverage.svg docs/images/coverage.svg
          git add docs/images/coverage.svg
          git diff --cached --quiet || git commit -m "chore: update coverage badge [skip ci]"
          git push origin badges
